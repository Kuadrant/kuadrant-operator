name: Build images for main branch

on:
  push:
    branches: ['main']
  workflow_dispatch: {}

jobs:
  workflow-build:
    name: Calls build-images-base workflow
    uses: ./.github/workflows/build-images-base.yaml
    secrets: inherit
    with:
      kuadrantOperatorVersion: 0.0.0
      kuadrantOperatorTag: latest
      quayImageExpiry: never
