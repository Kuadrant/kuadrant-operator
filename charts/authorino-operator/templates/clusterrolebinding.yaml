{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "authorino-operator.fullname" . }}-manager
  labels:
    {{- include "authorino-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.rbac.clusterRoleNamePrefix }}authorino-operator-manager
subjects:
- kind: ServiceAccount
  name: {{ include "authorino-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
