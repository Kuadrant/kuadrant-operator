# Default values for Authorino workload
nameOverride: ""
fullnameOverride: ""

image:
  repository: quay.io/kuadrant/authorino
  tag: latest
  pullPolicy: IfNotPresent

# replicas: 1  # Commented out - only set via CR to allow user scaling/HPA

# Whether Authorino should watch all namespaces (true) or just its own (false)
clusterWide: true

serviceAccount:
  create: true
  name: ""

# RBAC settings
rbac:
  install: true   # Install ClusterRoles from static/rbac/ (set false for OLM)
  create: true    # Create ClusterRoleBindings
  clusterRoleNamePrefix: ""  # Prefix for ClusterRole names (e.g., "kuadrant-operator-" when deployed via operator)

service:
  auth:
    port: 50051
    type: ClusterIP
  oidc:
    port: 8083
    type: ClusterIP

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

labels:
  app.kubernetes.io/component: authorization

# Additional arguments for authorino (base args, TLS args added by template if tls.enabled)
args:
  - --auth-config-label-selector=authorino.kuadrant.io/managed-by=authorino
  - --deep-metrics-enabled=true
  - --log-level=info
  - --log-mode=production
  - --oidc-http-port=8083
  - --timeout=0

# TLS configuration
tls:
  enabled: false  # Disabled by default - operator sets to true if needed
  certSecretName: authorino-oidc-server-cert
