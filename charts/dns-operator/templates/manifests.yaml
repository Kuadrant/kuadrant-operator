apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: dns-operator
    app.kubernetes.io/instance: controller-manager-sa
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/name: serviceaccount
    app.kubernetes.io/part-of: dns-operator
  name: dns-operator-controller-manager
  namespace: '{{ .Release.Namespace }}'
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: dns-operator
    app.kubernetes.io/instance: remote-cluster-sa
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/name: serviceaccount
    app.kubernetes.io/part-of: dns-operator
  name: dns-operator-remote-cluster
  namespace: '{{ .Release.Namespace }}'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: dns-operator
    app.kubernetes.io/instance: leader-election-role
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/name: role
    app.kubernetes.io/part-of: dns-operator
  name: dns-operator-leader-election-role
  namespace: '{{ .Release.Namespace }}'
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: dns-operator
    app.kubernetes.io/instance: leader-election-rolebinding
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/name: rolebinding
    app.kubernetes.io/part-of: dns-operator
  name: dns-operator-leader-election-rolebinding
  namespace: '{{ .Release.Namespace }}'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dns-operator-leader-election-role
subjects:
  - kind: ServiceAccount
    name: dns-operator-controller-manager
    namespace: '{{ .Release.Namespace }}'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: dns-operator
    app.kubernetes.io/instance: manager-rolebinding
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/name: clusterrolebinding
    app.kubernetes.io/part-of: dns-operator
  name: dns-operator-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dns-operator-manager-role
subjects:
  - kind: ServiceAccount
    name: dns-operator-controller-manager
    namespace: '{{ .Release.Namespace }}'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: dns-operator
    app.kubernetes.io/instance: remote-cluster-rolebinding
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/name: clusterrolebinding
    app.kubernetes.io/part-of: dns-operator
  name: dns-operator-remote-cluster-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dns-operator-remote-cluster-role
subjects:
  - kind: ServiceAccount
    name: dns-operator-remote-cluster
    namespace: '{{ .Release.Namespace }}'
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/managed-by: helm
  name: dns-operator-controller-env
  namespace: '{{ .Release.Namespace }}'
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: helm
    control-plane: dns-operator-controller-manager
  name: dns-operator-controller-manager-metrics-service
  namespace: '{{ .Release.Namespace }}'
spec:
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
    - name: pprof
      port: 8082
      targetPort: pprof
  selector:
    control-plane: dns-operator-controller-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/created-by: dns-operator
    app.kubernetes.io/instance: controller-manager
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/name: deployment
    app.kubernetes.io/part-of: dns-operator
    control-plane: dns-operator-controller-manager
  name: dns-operator-controller-manager
  namespace: '{{ .Release.Namespace }}'
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: dns-operator-controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/managed-by: helm
        control-plane: dns-operator-controller-manager
    spec:
      containers:
        - args:
            - --metrics-bind-address=:8080
            - --leader-elect
          command:
            - /manager
          env:
            - name: WATCH_NAMESPACES
              value: ""
            - name: CLUSTER_SECRET_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: dns-operator-controller-env
          image: quay.io/kuadrant/dns-operator:latest
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          name: manager
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8082
              name: pprof
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
      serviceAccountName: dns-operator-controller-manager
      terminationGracePeriodSeconds: 10
