# Default values for DNS Operator
nameOverride: ""
fullnameOverride: ""

image:
  repository: quay.io/kuadrant/dns-operator
  tag: latest
  pullPolicy: IfNotPresent

# replicas: 1  # Commented out - only set via CR to allow user scaling/HPA

serviceAccount:
  create: true
  name: ""

# RBAC settings
rbac:
  install: true   # Install ClusterRole from static/rbac/ (set false for OLM)
  create: true    # Create ClusterRoleBinding
  clusterRoleNamePrefix: ""  # Prefix for ClusterRole names (e.g., "kuadrant-operator-" when deployed via operator)

service:
  type: ClusterIP
  port: 8080

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

labels:
  app.kubernetes.io/component: dns-operator
