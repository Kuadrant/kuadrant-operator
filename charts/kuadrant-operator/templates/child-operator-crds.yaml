apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: authconfigs.authorino.kuadrant.io
spec:
  group: authorino.kuadrant.io
  names:
    kind: AuthConfig
    listKind: AuthConfigList
    plural: authconfigs
    singular: authconfig
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - description: Ready for all hosts
          jsonPath: .status.summary.ready
          name: Ready
          type: string
        - description: Number of hosts ready
          jsonPath: .status.summary.numHostsReady
          name: Hosts
          type: string
        - description: Number of trusted identity sources
          jsonPath: .status.summary.numIdentitySources
          name: Authentication
          priority: 2
          type: integer
        - description: Number of external metadata sources
          jsonPath: .status.summary.numMetadataSources
          name: Metadata
          priority: 2
          type: integer
        - description: Number of authorization policies
          jsonPath: .status.summary.numAuthorizationPolicies
          name: Authorization
          priority: 2
          type: integer
        - description: Number of items added to the authorization response
          jsonPath: .status.summary.numResponseItems
          name: Response
          priority: 2
          type: integer
        - description: Whether issuing Festival Wristbands
          jsonPath: .status.summary.festivalWristbandEnabled
          name: Wristband
          priority: 2
          type: boolean
      name: v1beta3
      schema:
        openAPIV3Schema:
          description: AuthConfig is the schema for Authorino's AuthConfig API
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: Specifies the desired state of the AuthConfig resource, i.e. the authentication/authorization scheme to be applied to protect the matching service hosts.
              properties:
                authentication:
                  additionalProperties:
                    oneOf:
                      - properties:
                          credentials: {}
                          oauth2Introspection: {}
                        required:
                          - oauth2Introspection
                      - properties:
                          credentials: {}
                          jwt: {}
                        required:
                          - jwt
                      - properties:
                          apiKey: {}
                          credentials: {}
                        required:
                          - apiKey
                      - properties:
                          credentials: {}
                          x509: {}
                        required:
                          - x509
                      - properties:
                          credentials: {}
                          kubernetesTokenReview: {}
                        required:
                          - kubernetesTokenReview
                      - properties:
                          anonymous: {}
                          credentials: {}
                        required:
                          - anonymous
                      - properties:
                          credentials: {}
                          plain: {}
                        required:
                          - plain
                    properties:
                      anonymous:
                        description: Anonymous access.
                        type: object
                      apiKey:
                        description: Authentication based on API keys stored in Kubernetes secrets.
                        properties:
                          allNamespaces:
                            default: false
                            description: |-
                              Whether Authorino should look for API key secrets in all namespaces or only in the same namespace as the AuthConfig.
                              Enabling this option in namespaced Authorino instances has no effect.
                            type: boolean
                          selector:
                            description: Label selector used by Authorino to match secrets from the cluster storing valid credentials to authenticate to this service
                            properties:
                              matchExpressions:
                                description: matchExpressions is a list of label selector requirements. The requirements are ANDed.
                                items:
                                  description: |-
                                    A label selector requirement is a selector that contains values, a key, and an operator that
                                    relates the key and values.
                                  properties:
                                    key:
                                      description: key is the label key that the selector applies to.
                                      type: string
                                    operator:
                                      description: |-
                                        operator represents a key's relationship to a set of values.
                                        Valid operators are In, NotIn, Exists and DoesNotExist.
                                      type: string
                                    values:
                                      description: |-
                                        values is an array of string values. If the operator is In or NotIn,
                                        the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                        the values array must be empty. This array is replaced during a strategic
                                        merge patch.
                                      items:
                                        type: string
                                      type: array
                                  required:
                                    - key
                                    - operator
                                  type: object
                                type: array
                              matchLabels:
                                additionalProperties:
                                  type: string
                                description: |-
                                  matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                                  map is equivalent to an element of matchExpressions, whose key field is "key", the
                                  operator is "In", and the values array contains only "value". The requirements are ANDed.
                                type: object
                            type: object
                            x-kubernetes-map-type: atomic
                        required:
                          - selector
                        type: object
                      cache:
                        description: |-
                          Caching options for the resolved object returned when applying this config.
                          Omit it to avoid caching objects for this config.
                        properties:
                          key:
                            description: |-
                              Key used to store the entry in the cache.
                              The resolved key must be unique within the scope of this particular config.
                            properties:
                              expression:
                                description: |-
                                  A Common Expression Language (CEL) expression that evaluates to a value.
                                  String expressions are supported (https://pkg.go.dev/github.com/google/cel-go/ext#Strings).
                                type: string
                              selector:
                                description: |-
                                  Simple path selector to fetch content from the authorization JSON (e.g. 'request.method') or a string template with variables that resolve to patterns (e.g. "Hello, {auth.identity.name}!").
                                  Any pattern supported by https://pkg.go.dev/github.com/tidwall/gjson can be used.
                                  The following Authorino custom modifiers are supported: @extract:{sep:" ",pos:0}, @replace{old:"",new:""}, @case:upper|lower, @base64:encode|decode and @strip.
                                type: string
                              value:
                                description: Static value
                                x-kubernetes-preserve-unknown-fields: true
                            type: object
                          ttl:
                            default: 60
                            description: Duration (in seconds) of the external data in the cache before pulled again from the source.
                            type: integer
                        required:
                          - key
                        type: object
                      credentials:
                        description: |-
                          Defines where credentials are required to be passed in the request for authentication based on this config.
                          If omitted, it defaults to credentials passed in the HTTP Authorization header and the "Bearer" prefix prepended to the secret credential value.
                        maxProperties: 1
                        properties:
                          authorizationHeader:
                            description: |-
                              Extract the credential from the HTTP Authorization header.
                              The prefix specifies the authentication scheme to strip from the header value (e.g. "Bearer", "APIKEY", "Basic").
                              Defaults to "Bearer" when prefix is omitted.
                            properties:
                              prefix:
                                type: string
                            type: object
                          cookie:
                            description: Extract the credential from a cookie specified by name.
                            properties:
                              name:
                                type: string
                            required:
                              - name
                            type: object
                          customHeader:
                            description: Extract the credential from a custom HTTP header specified by name.
                            properties:
                              name:
                                type: string
                            required:
                              - name
                            type: object
                          queryString:
                            description: Extract the credential from a query string parameter specified by name.
                            properties:
                              name:
                                type: string
                            required:
                              - name
                            type: object
                        type: object
                      defaults:
                        additionalProperties:
                          properties:
                            expression:
                              description: |-
                                A Common Expression Language (CEL) expression that evaluates to a value.
                                String expressions are supported (https://pkg.go.dev/github.com/google/cel-go/ext#Strings).
                              type: string
                            selector:
                              description: |-
                                Simple path selector to fetch content from the authorization JSON (e.g. 'request.method') or a string template with variables that resolve to patterns (e.g. "Hello, {auth.identity.name}!").
                                Any pattern supported by https://pkg.go.dev/github.com/tidwall/gjson can be used.
                                The following Authorino custom modifiers are supported: @extract:{sep:" ",pos:0}, @replace{old:"",new:""}, @case:upper|lower, @base64:encode|decode and @strip.
                              type: string
                            value:
