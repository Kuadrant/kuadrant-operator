# Default values for Limitador workload
nameOverride: ""
fullnameOverride: ""

image:
  repository: quay.io/kuadrant/limitador
  tag: latest
  pullPolicy: IfNotPresent

replicas: 1

serviceAccount:
  create: true
  name: ""

service:
  http:
    port: 8080
    type: ClusterIP
  grpc:
    port: 8081
    type: ClusterIP

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

labels:
  app.kubernetes.io/name: limitador
  app.kubernetes.io/component: rate-limiting

# Storage backend
storage:
  type: memory  # Options: memory, redis, redis-cached, disk

# Limits configuration
limits:
  configMapName: ""  # If empty, will be generated

# Additional environment variables
env: []
