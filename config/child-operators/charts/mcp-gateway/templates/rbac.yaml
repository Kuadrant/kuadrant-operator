{{- /* DO NOT EDIT rules - synced from config/rbac/role.yaml by 'make sync-rbac' */ -}}
{{- if .Values.controller.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-controller
  labels:
    {{- include "mcp-gateway.labels" . | nindent 4 }}
    component: controller
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - secrets
      - serviceaccounts
      - services
    verbs:
      - create
      - delete
      - get
      - list
      - update
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - create
      - delete
      - get
      - list
      - update
      - watch
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways/status
    verbs:
      - get
      - update
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - httproutes
    verbs:
      - create
      - delete
      - get
      - list
      - update
      - watch
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - httproutes/status
    verbs:
      - update
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - referencegrants
    verbs:
      - list
      - watch
  - apiGroups:
      - mcp.kuadrant.io
    resources:
      - mcpgatewayextensions
      - mcpserverregistrations
      - mcpvirtualservers
    verbs:
      - get
      - list
      - update
      - watch
  - apiGroups:
      - mcp.kuadrant.io
    resources:
      - mcpgatewayextensions/finalizers
      - mcpvirtualservers/finalizers
    verbs:
      - update
  - apiGroups:
      - mcp.kuadrant.io
    resources:
      - mcpgatewayextensions/status
      - mcpserverregistrations/status
      - mcpvirtualservers/status
    verbs:
      - get
      - update
  - apiGroups:
      - networking.istio.io
    resources:
      - envoyfilters
    verbs:
      - create
      - delete
      - get
      - list
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-controller
  labels:
    {{- include "mcp-gateway.labels" . | nindent 4 }}
    component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mcp-gateway.fullname" . }}-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "mcp-gateway.controllerServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
