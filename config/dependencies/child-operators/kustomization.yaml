# Child operator CRDs and RBAC resources
# These are included WITHOUT namePrefix so that child operators can find them
# with their original names (migration-friendly)

resources:
# Child operator CRDs
- authorino.kuadrant.io_authconfigs.yaml
- operator.authorino.kuadrant.io_authorinos.yaml
- limitador.kuadrant.io_limitadors.yaml
- kuadrant.io_dnshealthcheckprobes.yaml
- kuadrant.io_dnsrecords.yaml

# Child operator ClusterRoles
# Authorino workload ClusterRoles (for Authorino pods)
- authorino_manager_role.yaml
- authorino_manager_k8s_auth_role.yaml
# DNS Operator workload ClusterRole
- dns_operator_manager_role.yaml
# Authorino Operator ClusterRole (for authorino-operator pod)
- authorino_operator_manager_role.yaml
# Limitador Operator ClusterRole (for limitador-operator pod)
- limitador_operator_manager_role.yaml
