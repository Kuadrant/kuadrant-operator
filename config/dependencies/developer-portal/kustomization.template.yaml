# Install CRDs and RBAC resources from developer-portal-controller
# Only Deployment is created dynamically by the kuadrant-operator reconciler
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prefix to avoid name conflicts with other ClusterRoles
namePrefix: developer-portal-

resources:
# CRDs - directory ref adapts to whatever CRDs exist at the given ref
- github.com/Kuadrant/developer-portal-controller/config/crd?ref=${DEVELOPERPORTAL_GITREF}
# RBAC resources
- https://raw.githubusercontent.com/Kuadrant/developer-portal-controller/${DEVELOPERPORTAL_GITREF}/config/rbac/service_account.yaml
- https://raw.githubusercontent.com/Kuadrant/developer-portal-controller/${DEVELOPERPORTAL_GITREF}/config/rbac/role.yaml
- https://raw.githubusercontent.com/Kuadrant/developer-portal-controller/${DEVELOPERPORTAL_GITREF}/config/rbac/role_binding.yaml
- https://raw.githubusercontent.com/Kuadrant/developer-portal-controller/${DEVELOPERPORTAL_GITREF}/config/rbac/leader_election_role.yaml
- https://raw.githubusercontent.com/Kuadrant/developer-portal-controller/${DEVELOPERPORTAL_GITREF}/config/rbac/leader_election_role_binding.yaml
