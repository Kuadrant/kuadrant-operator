apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: metadata-to-header
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: httpbin
  rules:
    authentication:
      anonymous:
        anonymous: {}
    response:
      success:
        headers:
          x-model:
            plain:
              # The wasm-shim cannot currently detect the data type of the metadata set by the Go plugin, so it
              # serialises it as a string with null separators and other markers from the convertion back and forth
              # between proto and CEL.
              expression: metadata.filter_metadata["io.kuadrant"].payload_processor.split("model")[1].split("\u0000")[1]
