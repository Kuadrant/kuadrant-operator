# Simplified EnvoyFilter for the Golang payload processor
# Prerequisites:
# 1. Build extract_model.so (make build)
# 2. Deploy with deploy.sh

apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: extract-model-golang
  namespace: gateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: kuadrant-ingressgateway

  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: GATEWAY
      listener:
        portNumber: 80
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
    patch:
      # CRITICAL: INSERT_FIRST ensures this filter runs BEFORE Kuadrant wasm
      # This is necessary because the wasm filter needs the metadata/filter_state to be available
      # when it executes (for AuthPolicy/RateLimitPolicy decisions)
      operation: INSERT_FIRST
      value:
        name: envoy.filters.http.golang
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.golang.v3alpha.Config
          # Unique identifier for this filter
          library_id: payload_processor
          # Path where the .so file is located (emptyDir volume mount)
          library_path: /var/lib/golang-filters/extract_model.so
          # Plugin name (matches the registration in main.go)
          plugin_name: payload_processor
          # Configuration for the filter
          plugin_config:
            "@type": type.googleapis.com/xds.type.v3.TypedStruct
            value:
              # Regex pattern to search for (first capture group will be extracted)
              # Default: extract "model" field from JSON
              pattern: '"model"\s*:\s*"([^"]+)"'

              # Export type: "dynamic_metadata" or "filter_state"
              # Default: dynamic_metadata
              export_as: dynamic_metadata

              # Key where the data will be exported
              # - For dynamic_metadata: key within the metadata_namespace
              # - For filter_state: full filter state key path
              # Default: extracted_value
              object_key: model

              # CEL expression that evaluates to the value to export
              # Available: self.extractedValue (the matched regex group)
              # Default: self.extractedValue
              object_value: self.extractedValue

              # Metadata namespace (only used when export_as=dynamic_metadata)
              # Default: envoy.filters.http.golang.payload_processor
              metadata_namespace: "payload_processor"

              # Maximum size of rolling buffer (handles patterns split across chunks)
              # Default: 512 bytes
              max_buffer_size: 512

              # Content types to process (requests with other content types are skipped)
              # Default: ["application/json"]
              content_types:
                - "application/json"
