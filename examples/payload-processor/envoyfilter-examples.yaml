---
# Example 5: Extract multiple fields with CEL transformation
# Pattern captures version number, CEL prepends "v" prefix
# Pattern: "api_version":1 → filter_state value: "v1"
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: extract-api-version
  namespace: gateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: kuadrant-ingressgateway

  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: GATEWAY
      listener:
        portNumber: 80
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
    patch:
      operation: INSERT_FIRST
      value:
        name: envoy.filters.http.golang
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.golang.v3alpha.Config
          library_id: payload_processor
          library_path: /var/lib/golang-filters/extract_model.so
          plugin_name: payload_processor
          plugin_config:
            "@type": type.googleapis.com/xds.type.v3.TypedStruct
            value:
              pattern: '"api_version"\s*:\s*(\d+)'
              export_as: "filter_state"
              object_key: "envoy.filters.http.golang.payload_processor.api_version"
              # Prepend "v" to the version number
              object_value: '"v" + self.extractedValue'
              max_buffer_size: 512
              content_types:
                - "application/json"

