---
# Example 3: Export to filter_state with JSON-wrapped value
# Pattern captures the entire matched substring
# Result: filter_state["envoy.filters.http.golang.payload_processor"] = "{\"model\":\"gpt-4\"}"
# Useful when you want to preserve the original JSON structure
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: extract-model-filter-state-json
  namespace: gateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: kuadrant-ingressgateway

  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: GATEWAY
      listener:
        portNumber: 80
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
    patch:
      operation: INSERT_FIRST
      value:
        name: envoy.filters.http.golang
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.golang.v3alpha.Config
          library_id: payload_processor
          library_path: /var/lib/golang-filters/extract_model.so
          plugin_name: payload_processor
          plugin_config:
            "@type": type.googleapis.com/xds.type.v3.TypedStruct
            value:
              # Wrap the entire model field match in a capture group
              pattern: '("model"\s*:\s*"([^"]+)")'
              export_as: "filter_state"
              object_key: "envoy.filters.http.golang.payload_processor"
              # Wrap the extracted value in JSON braces
              object_value: '"{" + self.extractedValue + "}"'
              max_buffer_size: 512
              content_types:
                - "application/json"

