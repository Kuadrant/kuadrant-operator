# Example EnvoyFilter configurations for the Golang payload processor

---
# Example 1: Export to dynamic_metadata
# Result: {"envoy.filters.http.golang.payload_processor":{"model":"gpt-4"}}
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: extract-model-dynamic-metadata
  namespace: gateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: kuadrant-ingressgateway

  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: GATEWAY
      listener:
        portNumber: 80
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
    patch:
      operation: INSERT_FIRST
      value:
        name: envoy.filters.http.golang
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.golang.v3alpha.Config
          library_id: payload_processor
          library_path: /var/lib/golang-filters/extract_model.so
          plugin_name: payload_processor
          plugin_config:
            "@type": type.googleapis.com/xds.type.v3.TypedStruct
            value:
              pattern: '"model"\s*:\s*"([^"]+)"'
              export_as: "dynamic_metadata"
              metadata_namespace: "envoy.filters.http.golang.payload_processor"
              object_key: "model"
              object_value: "self.extractedValue"
              max_buffer_size: 512
              content_types:
                - "application/json"

