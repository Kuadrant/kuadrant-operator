syntax = "proto3";

option go_package = "/v1";

package kuadrant.v1;

import "v1/google/protobuf/timestamp.proto";
import "v1/google/protobuf/empty.proto";
import "v1/google/api/expr/v1alpha1/value.proto";
import "v1/google/rpc/status.proto";

import "v1/policy.proto";
import "v1/common.proto";

// The greeting service definition.
service ExtensionService {
  // Sends a greeting
  rpc Ping (PingRequest) returns (PongResponse) {}
  // Subscribe to a set of Events
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse) {}
  // Resolve the expression for context and subscribe (or not)
  rpc Resolve(ResolveRequest) returns (ResolveResponse) {}
  // Add data to an existing policy
  rpc RegisterMutator(RegisterMutatorRequest) returns (google.protobuf.Empty) {}
  // Clear all subscriptions and registered mutators for a policy
  rpc ClearPolicy(ClearPolicyRequest) returns (ClearPolicyResponse) {}
  // Register a named gRPC action method for a policy
  rpc RegisterActionMethod(RegisterActionMethodRequest) returns (google.protobuf.Empty) {}
  // Commit all pipeline actions for a policy atomically
  rpc PipelineCommit(PipelineCommitRequest) returns (google.protobuf.Empty) {}
}

// The request message containing the time the request was dispatched.
message PingRequest {
  google.protobuf.Timestamp out = 1;
}

// The response message containing the time the request was received.
message PongResponse {
  google.protobuf.Timestamp in = 1;
}

// evaluate the expression and whether or not to subscribe
message ResolveRequest {
  kuadrant.v1.Policy policy = 1;
  string expression = 2;
  bool subscribe = 3;
}

// Return the result as a cel value
message ResolveResponse {
  google.api.expr.v1alpha1.Value cel_result = 1;
}

message SubscribeResponse {
  Event event = 1;
  google.rpc.Status error = 2;
}

message SubscribeRequest {
  string policy_kind = 1;
}

message Event {
  Metadata metadata = 1;
}

enum Domain {
  DOMAIN_UNSPECIFIED = 0;
  DOMAIN_AUTH = 1;
  DOMAIN_REQUEST = 2;
}

message RegisterMutatorRequest {
  kuadrant.v1.Policy policy = 1;
  Domain domain = 2;
  string binding = 3;
  string expression = 4;
}

message ClearPolicyRequest {
  kuadrant.v1.Policy policy = 1;
}

message ClearPolicyResponse {
  int32 cleared_subscriptions = 1;
  int32 cleared_mutators = 2;
}

message RegisterActionMethodRequest {
  kuadrant.v1.Policy policy = 1;
  string url = 2;               // e.g. "grpc://my-service:8081"
  string service = 3;           // gRPC service name
  string method = 4;            // gRPC method name
  string name = 5;              // Per-policy unique identifier for this action method
  string message_template = 6;  // Opaque template string for building the gRPC request message
}

// ActionType discriminates how the wasm-shim dispatches an action.
enum ActionType {
  ACTION_TYPE_UNSPECIFIED = 0;
  ACTION_TYPE_GRPC_METHOD = 1;
  ACTION_TYPE_ALLOW = 2;
  ACTION_TYPE_ADD_HEADERS = 3;
  ACTION_TYPE_WITH_RESPONSE_CODE = 4;
}

// RequestActionEntry represents a single action in the request phase.
message RequestActionEntry {
  ActionType action_type = 1;
  string predicate = 2;   // CEL predicate — if false, skip this action
  string intention = 3;   // CEL expression evaluated against the gRPC response or request
  string method = 4;      // Name of a registered ActionMethod (for grpc_method type)
  string var = 5;         // Variable name for the gRPC response (used by onReply predicates)
}

// ResponseActionEntry represents a single action in the response phase.
message ResponseActionEntry {
  ActionType action_type = 1;
  string predicate = 2;       // CEL predicate — if false, skip this action
  string headers_to_add = 3;  // CEL expression evaluating to a map of headers (for add_headers type)
  int32 new_response_code = 4;  // HTTP status code (for with_response_code type)
}

// PipelineCommitRequest atomically replaces all pipeline actions for a policy.
message PipelineCommitRequest {
  kuadrant.v1.Policy policy = 1;
  repeated RequestActionEntry request_actions = 2;
  repeated ResponseActionEntry response_actions = 3;
}
